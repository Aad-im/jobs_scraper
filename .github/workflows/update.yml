name: update-jobs

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit results
        run: |
          git config user.name  "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add data/jobs.csv data/seen.json docs/index.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "jobs: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
